name: Continuous integration

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust:
          - stable

    steps:
      - uses: actions/checkout@v5
      - name: ⚡ Cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo
      - name: Run check
        run: cargo check --features defmt
      - name: Run tests
        run: cargo test
      - name: Check fmt
        run: cargo fmt --check
